<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">陣列演算法模式</title>
  <desc id="desc">用陣列格子呈現二元搜尋、雙指標、滑動視窗與前綴和。</desc>
  <rect width="920" height="420" rx="18" fill="#f8fafc"/>
  <text x="56" y="54" fill="#0f172a" font-family="Arial" font-size="24" font-weight="700">陣列常見模式</text>
  <g transform="translate(56 94)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">二元搜尋</text>
    <g transform="translate(0 24)">
      <rect x="0" y="0" width="60" height="44" fill="#dbeafe" stroke="#93c5fd"/>
      <rect x="60" y="0" width="60" height="44" fill="#dbeafe" stroke="#93c5fd"/>
      <rect x="120" y="0" width="60" height="44" fill="#fef3c7" stroke="#f59e0b"/>
      <rect x="180" y="0" width="60" height="44" fill="#dbeafe" stroke="#93c5fd"/>
      <rect x="240" y="0" width="60" height="44" fill="#dbeafe" stroke="#93c5fd"/>
      <text x="22" y="29" font-family="Arial" font-size="16">1</text>
      <text x="82" y="29" font-family="Arial" font-size="16">3</text>
      <text x="138" y="29" font-family="Arial" font-size="16">5</text>
      <text x="202" y="29" font-family="Arial" font-size="16">8</text>
      <text x="262" y="29" font-family="Arial" font-size="16">9</text>
      <text x="134" y="72" fill="#b45309" font-family="Arial" font-size="15" font-weight="700">中點</text>
    </g>
  </g>
  <g transform="translate(510 94)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">雙指標</text>
    <line x1="26" y1="70" x2="246" y2="70" stroke="#cbd5e1" stroke-width="16" stroke-linecap="round"/>
    <circle cx="26" cy="70" r="18" fill="#2563eb"/>
    <circle cx="246" cy="70" r="18" fill="#dc2626"/>
    <text x="19" y="76" fill="#fff" font-family="Arial" font-size="16" font-weight="700">左</text>
    <text x="239" y="76" fill="#fff" font-family="Arial" font-size="16" font-weight="700">右</text>
    <text x="84" y="110" fill="#475569" font-family="Arial" font-size="15">依條件向內移動</text>
  </g>
  <g transform="translate(56 252)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">滑動視窗</text>
    <rect x="0" y="26" width="360" height="52" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="96" y="26" width="144" height="52" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="132" y="58" fill="#166534" font-family="Arial" font-size="16" font-weight="700">目前視窗</text>
    <text x="100" y="104" fill="#475569" font-family="Arial" font-size="15">右端擴張，左端收縮</text>
  </g>
  <g transform="translate(510 252)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">前綴和</text>
    <rect x="0" y="26" width="66" height="44" fill="#e0f2fe" stroke="#38bdf8"/>
    <rect x="66" y="26" width="66" height="44" fill="#e0f2fe" stroke="#38bdf8"/>
    <rect x="132" y="26" width="66" height="44" fill="#e0f2fe" stroke="#38bdf8"/>
    <rect x="198" y="26" width="66" height="44" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="16" y="54" font-family="Arial" font-size="15">0</text>
    <text x="82" y="54" font-family="Arial" font-size="15">4</text>
    <text x="148" y="54" font-family="Arial" font-size="15">9</text>
    <text x="210" y="54" font-family="Arial" font-size="15">15</text>
    <text x="18" y="104" fill="#475569" font-family="Arial" font-size="15">區間和 = 前綴[右] - 前綴[左]</text>
  </g>
</svg>
