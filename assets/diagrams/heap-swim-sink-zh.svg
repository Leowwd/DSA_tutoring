<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">最小堆積的上浮與下沉</title>
  <desc id="desc">用陣列逐步呈現插入元素時向上交換，以及移除最小值後向下交換的過程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: Arial, "Noto Sans TC", "PingFang TC", sans-serif; fill: #172033; }
      .section { font-size: 21px; font-weight: 700; }
      .label { font-size: 16px; fill: #475569; }
      .number { font-size: 19px; font-weight: 700; text-anchor: middle; }
      .note { font-size: 15px; fill: #334155; }
    </style>
  </defs>
  <rect width="960" height="520" fill="#f8fafc"/>
  <text x="52" y="52" font-size="27" font-weight="700">最小堆積：上浮與下沉都只走一條路徑</text>
  <line x1="480" y1="82" x2="480" y2="474" stroke="#cbd5e1" stroke-width="2"/>

  <g transform="translate(48 98)">
    <text class="section" x="0" y="0">插入 2：與父節點比較並上浮</text>
    <text class="label" x="0" y="36">先加在陣列尾端</text>
    <g transform="translate(0 52)">
      <g fill="#ffffff" stroke="#94a3b8">
        <rect x="0" y="0" width="54" height="50"/><rect x="54" y="0" width="54" height="50"/>
        <rect x="108" y="0" width="54" height="50"/><rect x="162" y="0" width="54" height="50"/>
        <rect x="216" y="0" width="54" height="50"/><rect x="270" y="0" width="54" height="50"/>
      </g>
      <rect x="324" y="0" width="54" height="50" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
      <g class="number">
        <text x="27" y="32">3</text><text x="81" y="32">7</text><text x="135" y="32">5</text>
        <text x="189" y="32">12</text><text x="243" y="32">9</text><text x="297" y="32">8</text><text x="351" y="32">2</text>
      </g>
      <g class="label" text-anchor="middle">
        <text x="27" y="71">0</text><text x="81" y="71">1</text><text x="135" y="71">2</text>
        <text x="189" y="71">3</text><text x="243" y="71">4</text><text x="297" y="71">5</text><text x="351" y="71">6</text>
      </g>
    </g>
    <path d="M 346 146 C 346 177, 174 167, 174 200" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text class="note" x="4" y="176">2 小於父節點 5，交換；再與 3 交換</text>
    <g transform="translate(0 216)">
      <rect x="0" y="0" width="54" height="50" fill="#bbf7d0" stroke="#15803d" stroke-width="3"/>
      <g fill="#ffffff" stroke="#94a3b8">
        <rect x="54" y="0" width="54" height="50"/><rect x="108" y="0" width="54" height="50"/>
        <rect x="162" y="0" width="54" height="50"/><rect x="216" y="0" width="54" height="50"/>
        <rect x="270" y="0" width="54" height="50"/><rect x="324" y="0" width="54" height="50"/>
      </g>
      <g class="number">
        <text x="27" y="32">2</text><text x="81" y="32">7</text><text x="135" y="32">3</text>
        <text x="189" y="32">12</text><text x="243" y="32">9</text><text x="297" y="32">8</text><text x="351" y="32">5</text>
      </g>
    </g>
    <rect x="0" y="302" width="386" height="66" fill="#ecfdf5" stroke="#86efac"/>
    <text x="18" y="329" font-size="16" font-weight="700" fill="#166534">停止條件</text>
    <text class="note" x="18" y="353">新值不再小於父節點，或已經到達根節點。</text>
  </g>

  <g transform="translate(522 98)">
    <text class="section" x="0" y="0">移除最小值：尾端補根後下沉</text>
    <text class="label" x="0" y="36">把尾端的 8 移到根節點</text>
    <g transform="translate(0 52)">
      <rect x="0" y="0" width="62" height="50" fill="#fecaca" stroke="#dc2626" stroke-width="3"/>
      <g fill="#ffffff" stroke="#94a3b8">
        <rect x="62" y="0" width="62" height="50"/><rect x="124" y="0" width="62" height="50"/>
        <rect x="186" y="0" width="62" height="50"/><rect x="248" y="0" width="62" height="50"/>
      </g>
      <g class="number">
        <text x="31" y="32">8</text><text x="93" y="32">4</text><text x="155" y="32">5</text>
        <text x="217" y="32">9</text><text x="279" y="32">7</text>
      </g>
    </g>
    <path d="M 31 124 C 31 166, 168 158, 168 200" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text class="note" x="0" y="176">每次與較小的子節點交換：先 4，再 7</text>
    <g transform="translate(0 216)">
      <rect x="0" y="0" width="62" height="50" fill="#bbf7d0" stroke="#15803d" stroke-width="3"/>
      <rect x="62" y="0" width="62" height="50" fill="#dcfce7" stroke="#16a34a"/>
      <g fill="#ffffff" stroke="#94a3b8">
        <rect x="124" y="0" width="62" height="50"/><rect x="186" y="0" width="62" height="50"/><rect x="248" y="0" width="62" height="50"/>
      </g>
      <g class="number">
        <text x="31" y="32">4</text><text x="93" y="32">7</text><text x="155" y="32">5</text>
        <text x="217" y="32">9</text><text x="279" y="32">8</text>
      </g>
    </g>
    <rect x="0" y="302" width="386" height="66" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="18" y="329" font-size="16" font-weight="700" fill="#1d4ed8">為什麼只比較較小的子節點？</text>
    <text class="note" x="18" y="353">先換到較小的一側，才能恢復父節點不大於子節點。</text>
  </g>
</svg>
