<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Recursion and backtracking</title>
  <desc id="desc">A recursion call stack and a backtracking decision tree with choose and unchoose steps.</desc>
  <rect width="920" height="420" rx="18" fill="#f8fafc"/>
  <text x="56" y="54" fill="#0f172a" font-family="Arial" font-size="24" font-weight="700">Recursion and Backtracking</text>
  <g transform="translate(66 102)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">Recursive call stack</text>
    <rect x="0" y="36" width="250" height="40" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="26" y="76" width="224" height="40" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="52" y="116" width="198" height="40" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="78" y="156" width="172" height="40" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="18" y="62" font-family="Arial" font-size="15">factorial(4)</text>
    <text x="44" y="102" font-family="Arial" font-size="15">factorial(3)</text>
    <text x="70" y="142" font-family="Arial" font-size="15">factorial(2)</text>
    <text x="96" y="182" font-family="Arial" font-size="15">factorial(1)</text>
    <text x="0" y="240" fill="#475569" font-family="Arial" font-size="15">Each active recursive call has its own frame.</text>
  </g>
  <g transform="translate(430 102)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">Backtracking decision tree</text>
    <circle cx="170" cy="46" r="24" fill="#ffffff" stroke="#94a3b8"/>
    <circle cx="90" cy="118" r="24" fill="#dbeafe" stroke="#2563eb"/>
    <circle cx="250" cy="118" r="24" fill="#dbeafe" stroke="#2563eb"/>
    <circle cx="50" cy="196" r="22" fill="#dcfce7" stroke="#16a34a"/>
    <circle cx="130" cy="196" r="22" fill="#dcfce7" stroke="#16a34a"/>
    <circle cx="210" cy="196" r="22" fill="#dcfce7" stroke="#16a34a"/>
    <circle cx="290" cy="196" r="22" fill="#dcfce7" stroke="#16a34a"/>
    <line x1="154" y1="64" x2="106" y2="100" stroke="#94a3b8" stroke-width="3"/>
    <line x1="186" y1="64" x2="234" y2="100" stroke="#94a3b8" stroke-width="3"/>
    <line x1="78" y1="138" x2="60" y2="176" stroke="#94a3b8" stroke-width="3"/>
    <line x1="102" y1="138" x2="120" y2="176" stroke="#94a3b8" stroke-width="3"/>
    <line x1="238" y1="138" x2="220" y2="176" stroke="#94a3b8" stroke-width="3"/>
    <line x1="262" y1="138" x2="280" y2="176" stroke="#94a3b8" stroke-width="3"/>
    <g font-family="Arial" font-size="14" text-anchor="middle">
      <text x="170" y="52">start</text>
      <text x="90" y="123">take</text>
      <text x="250" y="123">skip</text>
      <text x="50" y="201">A</text>
      <text x="130" y="201">B</text>
      <text x="210" y="201">C</text>
      <text x="290" y="201">D</text>
    </g>
    <text x="0" y="260" fill="#475569" font-family="Arial" font-size="15">Choose, recurse, then unchoose to explore the next branch.</text>
  </g>
</svg>
