<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Shortest-path relaxation</title>
  <desc id="desc">A four-node weighted graph and three priority-queue steps show tentative distance updates.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      text { font-family: Arial, "Noto Sans TC", "PingFang TC", sans-serif; fill: #172033; }
      .node { fill: #ffffff; stroke: #2563eb; stroke-width: 3; }
      .done { fill: #bbf7d0; stroke: #15803d; stroke-width: 3; }
      .nodeText { font-size: 18px; font-weight: 700; text-anchor: middle; }
      .edge { stroke: #94a3b8; stroke-width: 4; }
      .weight { font-size: 15px; font-weight: 700; text-anchor: middle; }
      .small { font-size: 15px; fill: #475569; }
    </style>
  </defs>
  <rect width="960" height="520" fill="#f8fafc"/>
  <text x="52" y="52" font-size="27" font-weight="700">Dijkstra: settle the nearest node next</text>

  <g transform="translate(52 92)">
    <text x="0" y="0" font-size="21" font-weight="700">Weighted graph</text>
    <g class="edge">
      <line x1="76" y1="150" x2="196" y2="72"/>
      <line x1="76" y1="150" x2="196" y2="238"/>
      <line x1="224" y1="82" x2="224" y2="223"/>
      <line x1="252" y1="72" x2="366" y2="150"/>
      <line x1="252" y1="238" x2="366" y2="150"/>
    </g>
    <g>
      <rect x="120" y="89" width="28" height="24" fill="#f8fafc"/><text class="weight" x="134" y="107">4</text>
      <rect x="120" y="195" width="28" height="24" fill="#f8fafc"/><text class="weight" x="134" y="213">1</text>
      <rect x="210" y="142" width="28" height="24" fill="#f8fafc"/><text class="weight" x="224" y="160">2</text>
      <rect x="304" y="89" width="28" height="24" fill="#f8fafc"/><text class="weight" x="318" y="107">1</text>
      <rect x="304" y="195" width="28" height="24" fill="#f8fafc"/><text class="weight" x="318" y="213">5</text>
    </g>
    <circle class="done" cx="50" cy="150" r="34"/><text class="nodeText" x="50" y="157">Start</text>
    <circle class="node" cx="224" cy="55" r="31"/><text class="nodeText" x="224" y="62">A</text>
    <circle class="node" cx="224" cy="255" r="31"/><text class="nodeText" x="224" y="262">B</text>
    <circle class="node" cx="392" cy="150" r="34"/><text class="nodeText" x="392" y="157">Goal</text>
    <rect x="0" y="320" width="425" height="68" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="18" y="347" font-size="16" font-weight="700" fill="#1d4ed8">Relaxation rule</text>
    <text class="small" x="18" y="373">Update and enqueue whenever a route is shorter.</text>
  </g>

  <g transform="translate(526 92)">
    <text x="0" y="0" font-size="18" font-weight="700">Priority queue removes the nearest node</text>
    <g transform="translate(0 30)">
      <rect x="0" y="0" width="382" height="42" fill="#e2e8f0"/>
      <text x="23" y="27" font-size="15" font-weight="700">Step</text>
      <text x="98" y="27" font-size="15" font-weight="700">Remove</text>
      <text x="194" y="27" font-size="15" font-weight="700">Updates</text>

      <g font-size="16">
        <rect x="0" y="42" width="382" height="70" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="28" y="83" text-anchor="middle">1</text><text x="98" y="83" text-anchor="middle" font-weight="700">Start 0</text>
        <text x="166" y="72">A: 4</text><text x="166" y="95">B: 1</text>

        <rect x="0" y="112" width="382" height="70" fill="#f0fdf4" stroke="#86efac"/>
        <text x="28" y="153" text-anchor="middle">2</text><text x="98" y="153" text-anchor="middle" font-weight="700">B 1</text>
        <text x="166" y="142">A: 4 → 3</text><text x="276" y="142">Goal: 6</text>
        <text x="166" y="166" fill="#15803d" font-size="14">Shorter through B</text>

        <rect x="0" y="182" width="382" height="70" fill="#f0fdf4" stroke="#86efac"/>
        <text x="28" y="223" text-anchor="middle">3</text><text x="98" y="223" text-anchor="middle" font-weight="700">A 3</text>
        <text x="166" y="212">Goal: 6 → 4</text>
        <text x="166" y="236" fill="#15803d" font-size="14">A shorter route again</text>

        <rect x="0" y="252" width="382" height="54" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
        <text x="24" y="285" font-weight="700" fill="#166534">Final: Start 0, B 1, A 3, Goal 4</text>
      </g>
    </g>
    <text class="small" x="0" y="374">Dijkstra requires nonnegative edge weights.</text>
  </g>
</svg>
