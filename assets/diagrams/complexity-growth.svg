<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Growth rates comparison</title>
  <desc id="desc">A chart comparing constant, logarithmic, linear, n log n, quadratic, and exponential growth.</desc>
  <rect width="920" height="420" rx="18" fill="#f8fafc"/>
  <rect x="72" y="42" width="760" height="300" rx="12" fill="#ffffff" stroke="#d9e2ec"/>
  <line x1="118" y1="306" x2="790" y2="306" stroke="#475569" stroke-width="2"/>
  <line x1="118" y1="306" x2="118" y2="72" stroke="#475569" stroke-width="2"/>
  <text x="790" y="334" fill="#475569" font-family="Arial" font-size="15">input size n</text>
  <text x="34" y="78" fill="#475569" font-family="Arial" font-size="15">work</text>
  <path d="M118 260 C260 260 450 260 760 260" fill="none" stroke="#0f766e" stroke-width="4"/>
  <path d="M118 292 C210 246 340 222 760 198" fill="none" stroke="#2563eb" stroke-width="4"/>
  <path d="M118 292 L760 126" fill="none" stroke="#16a34a" stroke-width="4"/>
  <path d="M118 300 C230 284 390 222 760 82" fill="none" stroke="#ca8a04" stroke-width="4"/>
  <path d="M118 304 C250 296 420 224 638 78" fill="none" stroke="#dc2626" stroke-width="4"/>
  <path d="M118 304 C230 304 336 300 420 274 C520 244 576 162 612 76" fill="none" stroke="#7c3aed" stroke-width="4"/>
  <g font-family="Arial" font-size="16" font-weight="700">
    <text x="676" y="264" fill="#0f766e">O(1)</text>
    <text x="676" y="204" fill="#2563eb">O(log n)</text>
    <text x="676" y="136" fill="#16a34a">O(n)</text>
    <text x="594" y="96" fill="#ca8a04">O(n log n)</text>
    <text x="500" y="80" fill="#dc2626">O(n^2)</text>
    <text x="466" y="158" fill="#7c3aed">O(2^n)</text>
  </g>
  <text x="72" y="382" fill="#334155" font-family="Arial" font-size="18" font-weight="700">Key idea</text>
  <text x="158" y="382" fill="#475569" font-family="Arial" font-size="17">As n grows, asymptotic behavior matters more than small constant differences.</text>
</svg>
