<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Tree and heap mental models</title>
  <desc id="desc">A binary search tree and a min heap with its array representation.</desc>
  <rect width="920" height="420" rx="18" fill="#f8fafc"/>
  <text x="56" y="54" fill="#0f172a" font-family="Arial" font-size="24" font-weight="700">Trees and Heaps</text>
  <g transform="translate(80 98)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">BST invariant</text>
    <line x1="150" y1="50" x2="80" y2="120" stroke="#94a3b8" stroke-width="3"/>
    <line x1="150" y1="50" x2="220" y2="120" stroke="#94a3b8" stroke-width="3"/>
    <line x1="80" y1="120" x2="45" y2="190" stroke="#94a3b8" stroke-width="3"/>
    <line x1="80" y1="120" x2="115" y2="190" stroke="#94a3b8" stroke-width="3"/>
    <line x1="220" y1="120" x2="185" y2="190" stroke="#94a3b8" stroke-width="3"/>
    <line x1="220" y1="120" x2="255" y2="190" stroke="#94a3b8" stroke-width="3"/>
    <g font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">
      <circle cx="150" cy="50" r="27" fill="#dbeafe" stroke="#2563eb"/>
      <text x="150" y="56">50</text>
      <circle cx="80" cy="120" r="27" fill="#dcfce7" stroke="#16a34a"/>
      <text x="80" y="126">25</text>
      <circle cx="220" cy="120" r="27" fill="#fee2e2" stroke="#dc2626"/>
      <text x="220" y="126">75</text>
      <circle cx="45" cy="190" r="23" fill="#fff" stroke="#94a3b8"/>
      <text x="45" y="196">10</text>
      <circle cx="115" cy="190" r="23" fill="#fff" stroke="#94a3b8"/>
      <text x="115" y="196">40</text>
      <circle cx="185" cy="190" r="23" fill="#fff" stroke="#94a3b8"/>
      <text x="185" y="196">60</text>
      <circle cx="255" cy="190" r="23" fill="#fff" stroke="#94a3b8"/>
      <text x="255" y="196">90</text>
    </g>
    <text x="18" y="250" fill="#475569" font-family="Arial" font-size="15">left smaller, right larger</text>
  </g>
  <g transform="translate(505 98)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">Min heap</text>
    <line x1="150" y1="50" x2="85" y2="118" stroke="#94a3b8" stroke-width="3"/>
    <line x1="150" y1="50" x2="215" y2="118" stroke="#94a3b8" stroke-width="3"/>
    <line x1="85" y1="118" x2="45" y2="184" stroke="#94a3b8" stroke-width="3"/>
    <line x1="85" y1="118" x2="125" y2="184" stroke="#94a3b8" stroke-width="3"/>
    <g font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">
      <circle cx="150" cy="50" r="27" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="150" y="56">3</text>
      <circle cx="85" cy="118" r="27" fill="#ffffff" stroke="#94a3b8"/>
      <text x="85" y="124">8</text>
      <circle cx="215" cy="118" r="27" fill="#ffffff" stroke="#94a3b8"/>
      <text x="215" y="124">5</text>
      <circle cx="45" cy="184" r="23" fill="#ffffff" stroke="#94a3b8"/>
      <text x="45" y="190">12</text>
      <circle cx="125" cy="184" r="23" fill="#ffffff" stroke="#94a3b8"/>
      <text x="125" y="190">10</text>
    </g>
    <g transform="translate(0 236)">
      <rect x="0" y="0" width="48" height="38" fill="#fef3c7" stroke="#f59e0b"/>
      <rect x="48" y="0" width="48" height="38" fill="#fff" stroke="#94a3b8"/>
      <rect x="96" y="0" width="48" height="38" fill="#fff" stroke="#94a3b8"/>
      <rect x="144" y="0" width="48" height="38" fill="#fff" stroke="#94a3b8"/>
      <rect x="192" y="0" width="48" height="38" fill="#fff" stroke="#94a3b8"/>
      <text x="19" y="25" font-family="Arial" font-size="15">3</text>
      <text x="67" y="25" font-family="Arial" font-size="15">8</text>
      <text x="115" y="25" font-family="Arial" font-size="15">5</text>
      <text x="158" y="25" font-family="Arial" font-size="15">12</text>
      <text x="206" y="25" font-family="Arial" font-size="15">10</text>
    </g>
  </g>
</svg>
