<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Memory and amortized resizing</title>
  <desc id="desc">A call stack, heap objects, and dynamic array resizing by doubling capacity.</desc>
  <rect width="920" height="420" rx="18" fill="#f8fafc"/>
  <text x="56" y="54" fill="#0f172a" font-family="Arial" font-size="24" font-weight="700">Space and Amortization</text>
  <g transform="translate(58 96)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">Call stack</text>
    <rect x="0" y="32" width="180" height="46" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="0" y="78" width="180" height="46" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="0" y="124" width="180" height="46" fill="#dbeafe" stroke="#2563eb"/>
    <text x="22" y="61" font-family="Arial" font-size="15">reverseInPlace</text>
    <text x="22" y="107" font-family="Arial" font-size="15">helper call</text>
    <text x="22" y="153" font-family="Arial" font-size="15">recursive call</text>
    <text x="0" y="216" fill="#475569" font-family="Arial" font-size="15">Recursive depth contributes auxiliary space.</text>
  </g>
  <g transform="translate(334 96)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">Heap objects</text>
    <rect x="0" y="36" width="238" height="70" rx="10" fill="#ffffff" stroke="#94a3b8"/>
    <text x="24" y="78" font-family="Arial" font-size="15">new int[n]</text>
    <rect x="0" y="128" width="238" height="70" rx="10" fill="#ffffff" stroke="#94a3b8"/>
    <text x="24" y="170" font-family="Arial" font-size="15">ArrayList backing array</text>
    <text x="0" y="216" fill="#475569" font-family="Arial" font-size="15">New arrays and collections count as extra memory.</text>
  </g>
  <g transform="translate(620 96)">
    <text x="0" y="0" fill="#334155" font-family="Arial" font-size="18" font-weight="700">Dynamic array growth</text>
    <g font-family="Arial" font-size="14" text-anchor="middle">
      <rect x="0" y="42" width="34" height="28" fill="#dcfce7" stroke="#16a34a"/>
      <rect x="34" y="42" width="34" height="28" fill="#dcfce7" stroke="#16a34a"/>
      <text x="34" y="98">cap 2</text>
      <line x1="82" y1="56" x2="128" y2="56" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="142" y="42" width="34" height="28" fill="#dcfce7" stroke="#16a34a"/>
      <rect x="176" y="42" width="34" height="28" fill="#dcfce7" stroke="#16a34a"/>
      <rect x="210" y="42" width="34" height="28" fill="#fef3c7" stroke="#f59e0b"/>
      <rect x="244" y="42" width="34" height="28" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="210" y="98">cap 4</text>
      <line x1="98" y1="154" x2="144" y2="154" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="158" y="140" width="26" height="28" fill="#dcfce7" stroke="#16a34a"/>
      <rect x="184" y="140" width="26" height="28" fill="#dcfce7" stroke="#16a34a"/>
      <rect x="210" y="140" width="26" height="28" fill="#dcfce7" stroke="#16a34a"/>
      <rect x="236" y="140" width="26" height="28" fill="#dcfce7" stroke="#16a34a"/>
      <rect x="262" y="140" width="26" height="28" fill="#fef3c7" stroke="#f59e0b"/>
      <rect x="288" y="140" width="26" height="28" fill="#fef3c7" stroke="#f59e0b"/>
      <rect x="314" y="140" width="26" height="28" fill="#fef3c7" stroke="#f59e0b"/>
      <rect x="340" y="140" width="26" height="28" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="262" y="198">cap 8</text>
    </g>
    <text x="0" y="246" fill="#475569" font-family="Arial" font-size="15">Occasional resize is expensive, but many appends average to O(1).</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
